<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Data Center Data Room</title>
  <desc id="desc">A stylized brokered compute deal: data-center racks, documents, market evidence, and a handshake.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f1eadf"/>
    </linearGradient>
    <linearGradient id="room" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f3ea"/>
      <stop offset="1" stop-color="#e7ded0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e9f6f4"/>
      <stop offset="1" stop-color="#c7e2dd"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5b5144" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="960" height="560" rx="30" fill="#efe7da"/>
