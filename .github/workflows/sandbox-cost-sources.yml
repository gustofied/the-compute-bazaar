name: Sandbox cost source check

"on":
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.31"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync the project
        run: uv sync --locked --package the-compute-bazaar

      - name: Validate canonical evidence
        run: uv run --package the-compute-bazaar sandbox-cost validate

      - name: Detect new or changed public benchmark runs
        run: >-
          uv run --package the-compute-bazaar sandbox-cost refresh-benchmark
          --output-root data/sandbox-cost
          --source-ref main
          --check

      - name: Run focused benchmark tests
        run: >-
          uv run --package the-compute-bazaar python -m unittest
          tests.test_sandbox_cost tests.test_adamsioud
